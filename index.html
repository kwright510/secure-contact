<!DOCTYPE html>

    <style>

        body {
            font-family: 'Inter', sans-serif;

        .glass-card {

        }

        .copy-feedback {

            position: fixed;
            bottom: 20px;
            left: 50%;

            padding: 8px 16px;
            border-radius: 9999px;
            font-weight: 600;
        }
        /* Hero Image Styling */
        .hero-image {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 9999px;
            border: 2px solid rgba(56, 189, 248, 0.3);
            filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.4));
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-xl w-full">
        <!-- Header Section -->
                       <div class="text-center mb-8">

            <!-- Editable Title -->

        <!-- Contact Card -->

            <!-- Email Section -->
            <div class="space-y-2">

                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"></path></svg>

                <div class="flex items-center bg-slate-900/50 rounded-xl p-4 border border-slate-700">
                    <a href="https://signal.me/#eu/pJOgVVRUZjWQFwEZ7-qHnGOg4vjzMAnSarmKjvlKT3l_pcgfSepG55UBu-QhBB8F" target="_blank" class="flex-grow text-blue-400 hover:text-blue-300 transition truncate">
                        kwright510.817

                    <button onclick="copyToClipboard('kwright510.817')" class="ml-3 text-slate-500 hover:text-white transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"></path></svg>

 <!-- FOOTER -->

        <footer class="mt-8 text-center text-slate-500 text-xs">Communications using these methods are encrypted end-to-end.
        </footer>
    </div>

    <div id="toast" class="copy-feedback">Copied to clipboard!</div>

    <script>
        function copyToClipboard(text) {
            const tempInput = document.createElement('input');
            tempInput.value = text;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);

            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2000);
        }
    </script>
